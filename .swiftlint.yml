# https://github.com/realm/SwiftLint
excluded:
  - .build
  - dist
  - .swiftpm
  - Packages

line_length:
  warning: 130
  error: 180

identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 40
    error: 50
  excluded:
    - id

type_name:
  min_length:
    warning: 2

large_tuple:
  warning: 3
  error: 4

disabled_rules:
  - opening_brace
  - trailing_comma
